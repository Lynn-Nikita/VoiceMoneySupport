<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>还剩多少钱 - 支持页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .app-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #34C759, #30D158);
            border-radius: 22px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 8px 24px rgba(52, 199, 89, 0.3);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        a {
            display: block;
            padding: 14px 24px;
            background: #f5f5f7;
            border-radius: 12px;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 15px;
            font-weight: 500;
            transition: background 0.2s;
        }
        a:hover {
            background: #e8e8ed;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">💰</div>
        <h1>还剩多少钱</h1>

        </div>
        <p class="footer">© 2026 还剩多少钱 保留所有权利</p>
    </div>
</body>
</html>
